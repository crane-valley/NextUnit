name: Release

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write  # enable GitHub OIDC token for NuGet Trusted Publishing
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/artifacts/packages-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' Directory.Build.props)
          if [ -z "$PACKAGE_VERSION" ]; then
            echo "Error: package version not found in Directory.Build.props"
            exit 1
          fi
          if [ "v$PACKAGE_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "Error: release tag ${{ github.event.release.tag_name }} does not match package version $PACKAGE_VERSION"
            exit 1
          fi
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Restore dependencies
        run: dotnet restore NextUnit.slnx

      - name: Build
        run: dotnet build NextUnit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution NextUnit.slnx --configuration Release --no-build

      - name: Pack all packages
        run: |
          echo "Packing NextUnit.Core..."
          dotnet pack src/NextUnit.Core/NextUnit.Core.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packing NextUnit.Generator..."
          dotnet pack src/NextUnit.Generator/NextUnit.Generator.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packing NextUnit.Platform..."
          dotnet pack src/NextUnit.Platform/NextUnit.Platform.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packing NextUnit.TestAdapter..."
          dotnet pack src/NextUnit.TestAdapter/NextUnit.TestAdapter.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packing NextUnit.AspNetCore..."
          dotnet pack src/NextUnit.AspNetCore/NextUnit.AspNetCore.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packing NextUnit meta-package..."
          dotnet pack src/NextUnit/NextUnit.csproj \
            --configuration Release \
            --output ./artifacts/packages \
            --no-build

          echo "Packages created:"
          ls -lh ./artifacts/packages/*.nupkg

      - name: Verify package contents
        shell: bash
        run: |
          packages=(
            NextUnit
            NextUnit.Core
            NextUnit.Generator
            NextUnit.Platform
            NextUnit.TestAdapter
            NextUnit.AspNetCore
          )
          for package in "${packages[@]}"; do
            path="./artifacts/packages/$package.$PACKAGE_VERSION.nupkg"
            if [ ! -f "$path" ]; then
              echo "Error: required package not found: $path"
              exit 1
            fi
            echo "Verified $path"
          done
          package_count=$(find ./artifacts/packages -maxdepth 1 -type f -name '*.nupkg' | wc -l)
          if [ "$package_count" -ne "${#packages[@]}" ]; then
            echo "Error: expected ${#packages[@]} packages, found $package_count"
            exit 1
          fi

      - name: Verify one-package integration
        run: |
          dotnet restore tests/NextUnit.PackageSmoke/NextUnit.PackageSmoke.csproj \
            --configfile .github/NextUnit.PackageSmoke.NuGet.Config \
            -p:UseLocalNextUnitPackage=true
          dotnet run --project tests/NextUnit.PackageSmoke/NextUnit.PackageSmoke.csproj \
            --configuration Release \
            --no-restore \
            -p:UseLocalNextUnitPackage=true \
            -- --minimum-expected-tests 1
          dotnet restore tests/NextUnit.AspNetCore.PackageSmoke/NextUnit.AspNetCore.PackageSmoke.csproj \
            --configfile .github/NextUnit.PackageSmoke.NuGet.Config \
            -p:UseLocalNextUnitPackage=true
          dotnet run --project tests/NextUnit.AspNetCore.PackageSmoke/NextUnit.AspNetCore.PackageSmoke.csproj \
            --configuration Release \
            --no-restore \
            -p:UseLocalNextUnitPackage=true \
            -- --minimum-expected-tests 1

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
