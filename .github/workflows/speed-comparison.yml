name: Speed Comparison Benchmarks

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Measured rounds per participant; must be divisible by 7'
        required: false
        default: '21'
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/speed-comparison/**'
      - '.github/workflows/speed-comparison.yml'

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  benchmark:
    name: Run Speed Comparison
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Display .NET info
        run: dotnet --info
      
      - name: Restore dependencies
        run: dotnet restore tools/speed-comparison/Tests.Benchmark/Tests.Benchmark.csproj
      
      - name: Build speed comparison projects
        run: |
          echo "Building speed comparison projects..."
          cd tools/speed-comparison
          dotnet build Tests.Benchmark/Tests.Benchmark.csproj --configuration Release --no-restore
      
      - name: Run round-robin speed comparison
        env:
          ROUNDS: ${{ inputs.iterations || '21' }}
        run: dotnet run -c Release --no-build --project tools/speed-comparison/Tests.Benchmark -- --round-robin "$ROUNDS"
        continue-on-error: false
      
      - name: Display benchmark results
        run: |
          echo "=== Benchmark Results ==="
          RESULT=tools/speed-comparison/results/RUNTIME_COMPARISON.md
          if [ -f "$RESULT" ]; then
            cat "$RESULT"
          else
            echo "No benchmark results found"
            exit 1
          fi
        if: success()
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: speed-comparison-results
          path: |
            tools/speed-comparison/results/RUNTIME_COMPARISON.md
            tools/speed-comparison/results/runtime-comparison.json
          retention-days: 90
        if: success()
      
      - name: Comment PR with results (on pull requests)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const resultPath = 'tools/speed-comparison/results/RUNTIME_COMPARISON.md';
            if (!fs.existsSync(resultPath)) {
              console.log('Round-robin result file not found');
              return;
            }
            const results = fs.readFileSync(resultPath, 'utf8');
            const comment = `## Speed Comparison Results (round-robin)\n\n${results}\n\n---\n*Benchmarks run on ${new Date().toISOString()}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()
    
    steps:
      - name: Download results
        uses: actions/download-artifact@v8
        with:
          name: speed-comparison-results
          path: results
        continue-on-error: true
      
      - name: Generate job summary
        run: |
          echo "# Speed Comparison Benchmark Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          LATEST_MD=$(find results -name "RUNTIME_COMPARISON.md" -type f 2>/dev/null | head -1)
          
          if [ -n "$LATEST_MD" ] && [ -f "$LATEST_MD" ]; then
            cat "$LATEST_MD" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Benchmarks completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Benchmark results not found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files:" >> $GITHUB_STEP_SUMMARY
            find results -type f 2>/dev/null || echo "No files found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Job Status**: ${{ needs.benchmark.result }}" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
